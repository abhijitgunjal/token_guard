name: Publish to PyPI

# Triggers:
#   - Every push to main runs tests
#   - Creating a version tag (v0.3.0) publishes to PyPI automatically
on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"           # e.g. v0.3.0, v1.0.0
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Run tests on every push / PR
  # ─────────────────────────────────────────────────────────────
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/test_token_guard.py -v

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build the distribution
  # Runs only when a version tag is pushed
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test                # only build if tests pass
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────────────────────
  # Job 3: Publish to PyPI
  # Runs only after a successful build on a version tag
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    # Required for PyPI Trusted Publishing (no API token needed)
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/token-guard/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no PYPI_API_TOKEN secret needed
        # Set this up once at: https://pypi.org/manage/account/publishing/
